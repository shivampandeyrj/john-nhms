<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | NHMS</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav style="padding: 1.5rem 0; text-align: center; border-bottom: 1px solid var(--color-border); margin-bottom: 2rem;">
        <div class="container">
            <a href="/" style="display: inline-block;">
                <img src="assets/logo.png" alt="NHMS Logo" style="height: 50px; width: auto; max-width: 100%;">
            </a>
        </div>
    </nav>

    <section class="hero" style="min-height: 70vh;">
        <div class="container" style="text-align: center; max-width: 700px;">
            <div style="width: 60px; height: 60px; background: var(--color-teal); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem;">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--color-bg)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <h1>You're <span class="text-teal">In.</span></h1>
            <p style="font-size: 1.25rem;">Check your inbox. Your resource is on its way.</p>
            
            <div style="margin-top: 4rem; padding-top: 4rem; border-top: 1px solid var(--color-border);">
                <h3>Want to accelerate your results?</h3>
                <p>Don't wait for the resource. Book a free strategy call right now to map out your custom scale plan.</p>
                <a href="/call" class="btn" style="margin-top: 1rem;">Book Strategy Call</a>
            </div>
        </div>
    </section>
</body>
</html>
