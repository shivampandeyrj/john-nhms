<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | NHMS</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .admin-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }
        .sidebar {
            background-color: rgba(0, 0, 0, 0.03);
            padding: 2rem;
            border-right: 1px solid var(--color-border);
        }
        .sidebar-nav {
            list-style: none;
            margin-top: 2rem;
        }
        .sidebar-nav li {
            margin-bottom: 1rem;
        }
        .sidebar-nav a {
            color: var(--color-text-secondary);
            font-weight: 500;
        }
        .sidebar-nav a.active, .sidebar-nav a:hover {
            color: var(--color-teal);
        }
        .main-content {
            padding: 3rem;
        }
        .config-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--color-border);
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--color-border);
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: var(--color-text-primary);
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--color-teal);
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
    </style>
</head>
<body>
    <!-- Simple Mockup of Admin Dashboard. In reality, this would be gated via Google Identity Services or Firebase Auth -->
    <div class="admin-layout">
        <aside class="sidebar">
            <a href="/" style="display: inline-block; margin-bottom: 2rem;">
                <img src="assets/logo.png" alt="NHMS Logo" style="height: 35px; width: auto; max-width: 100%;">
            </a>
            
            <ul class="sidebar-nav">
                <li><a href="#" class="active">Lead Magnets</a></li>
                <li><a href="#">Links & Redirects</a></li>
                <li><a href="#">Leads (Google Sheet)</a></li>
                <li><a href="#">Settings</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <h2 style="margin-bottom: 2rem;">Manage Lead Magnets</h2>
            
            <div id="magnetsList">
                <!-- Magnets will be rendered here dynamically -->
            </div>

            <div class="config-card" style="margin-top: 3rem; border-color: var(--color-teal);">
                <h3 style="margin-bottom: 1.5rem; color: var(--color-teal);">Add New Lead Magnet</h3>
                <form id="addMagnetForm">
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 0.5rem; color: var(--color-text-secondary);">URL Slug (e.g., 10k-roadmap)</label>
                        <input type="text" id="magSlug" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 0.5rem; color: var(--color-text-secondary);">Header / Pre-Title (e.g., FREE RESOURCES)</label>
                        <input type="text" id="magHeader" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 0.5rem; color: var(--color-text-secondary);">Title / Headline</label>
                        <input type="text" id="magTitle" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 0.5rem; color: var(--color-text-secondary);">Information / Subtitle</label>
                        <textarea id="magInfo" class="form-control" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 0.5rem; color: var(--color-text-secondary);">Bullet Points (One per line)</label>
                        <textarea id="magBullets" class="form-control" rows="4"></textarea>
                    </div>
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 0.5rem; color: var(--color-text-secondary);">Profile Photo URL (Optional)</label>
                        <input type="text" id="magPhoto" class="form-control">
                    </div>
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 0.5rem; color: var(--color-text-secondary);">Button Text</label>
                        <input type="text" id="magBtnText" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 0.5rem; color: var(--color-text-secondary);">Mail Content (Use *text* for blue styling)</label>
                        <textarea id="magMail" class="form-control" rows="6" required></textarea>
                    </div>
                    <button type="submit" id="saveMagnetBtn" class="btn btn-primary" style="padding: 0.5rem 1.5rem; font-size: 1rem;">Create Lead Magnet</button>
                </form>
            </div>
            
            <h2 style="margin-bottom: 2rem; margin-top: 4rem;">Global Links</h2>
            
            <div class="config-card">
                <div class="form-group">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--color-text-secondary);">Booking Widget Source URL (for /call)</label>
                    <input type="text" id="bookingUrlInput" class="form-control" value="https://api.leadconnectorhq.com/widget/bookings/strategy-call-john-atkins">
                </div>
                <button id="saveBookingUrlBtn" class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.9rem;">Save Booking Link</button>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const bookingUrlInput = document.getElementById('bookingUrlInput');
            const saveBtn = document.getElementById('saveBookingUrlBtn');
            const magnetsList = document.getElementById('magnetsList');
            const addMagnetForm = document.getElementById('addMagnetForm');
            const saveMagnetBtn = document.getElementById('saveMagnetBtn');
            
            // --- Global Config Logic ---
            try {
                const res = await fetch('/api/config?key=booking_url');
                if (res.ok) {
                    const data = await res.json();
                    if (data.value) bookingUrlInput.value = data.value;
                }
            } catch (err) {
                console.error("Failed to load booking_url config", err);
            }
            
            saveBtn.addEventListener('click', async () => {
                const originalText = saveBtn.textContent;
                saveBtn.textContent = 'Saving...';
                saveBtn.disabled = true;
                
                try {
                    const res = await fetch('/api/config', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ key: 'booking_url', value: bookingUrlInput.value })
                    });
                    
                    if (res.ok) {
                        alert('Configuration saved successfully!');
                    } else {
                        alert('Failed to save configuration.');
                    }
                } catch (err) {
                    console.error("Failed to save booking_url config", err);
                    alert('Network error.');
                } finally {
                    saveBtn.textContent = originalText;
                    saveBtn.disabled = false;
                }
            });

            // --- Lead Magnet CRUD Logic ---
            async function loadMagnets() {
                magnetsList.innerHTML = '<p>Loading magnets...</p>';
                try {
                    const res = await fetch('/api/magnets');
                    if (res.ok) {
                        const magnets = await res.json();
                        magnetsList.innerHTML = '';
                        if (magnets.length === 0) {
                            magnetsList.innerHTML = '<p style="color: var(--color-text-secondary);">No lead magnets found. Create one below.</p>';
                            return;
                        }
                        
                        magnets.forEach(mag => {
                            const card = document.createElement('div');
                            card.className = 'config-card';
                            card.innerHTML = `
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                                    <h3>${mag.title || mag.slug}</h3>
                                    <button class="btn btn-outline" style="border-color: #ff4d4d; color: #ff4d4d;" onclick="deleteMagnet(${mag.id})">Delete</button>
                                </div>
                                <p style="color: var(--color-text-secondary); margin-bottom: 0;">Slug: /${mag.slug}</p>
                            `;
                            magnetsList.appendChild(card);
                        });
                    }
                } catch (err) {
                    console.error("Failed to load magnets", err);
                    magnetsList.innerHTML = '<p style="color: #ff4d4d;">Failed to load magnets.</p>';
                }
            }

            window.deleteMagnet = async function(id) {
                if (!confirm('Are you sure you want to delete this lead magnet?')) return;
                
                try {
                    const res = await fetch('/api/magnets/' + id, { method: 'DELETE' });
                    if (res.ok) {
                        loadMagnets();
                    } else {
                        alert('Failed to delete.');
                    }
                } catch (err) {
                    console.error("Failed to delete magnet", err);
                    alert('Network error.');
                }
            };

            addMagnetForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const originalText = saveMagnetBtn.textContent;
                saveMagnetBtn.textContent = 'Saving...';
                saveMagnetBtn.disabled = true;

                const payload = {
                    slug: document.getElementById('magSlug').value,
                    header: document.getElementById('magHeader').value,
                    title: document.getElementById('magTitle').value,
                    info: document.getElementById('magInfo').value,
                    bullet_points: document.getElementById('magBullets').value,
                    profile_photo: document.getElementById('magPhoto').value,
                    button_text: document.getElementById('magBtnText').value,
                    mail_content: document.getElementById('magMail').value
                };

                try {
                    const res = await fetch('/api/magnets', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (res.ok) {
                        addMagnetForm.reset();
                        loadMagnets();
                    } else {
                        const err = await res.json();
                        alert('Failed to create lead magnet: ' + (err.error || 'Unknown error'));
                    }
                } catch (err) {
                    console.error("Failed to create magnet", err);
                    alert('Network error.');
                } finally {
                    saveMagnetBtn.textContent = originalText;
                    saveMagnetBtn.disabled = false;
                }
            });

            // Initial load
            loadMagnets();
        });
    </script>
        </main>
    </div>
</body>
</html>
