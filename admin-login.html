<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | NHMS</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--color-background);
        }
        .login-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--color-border);
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-radius: 8px;
        }
        .login-card img {
            height: 40px;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .error-message {
            color: #ff4d4d;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="assets/logo.png" alt="NHMS Logo">
        <h2 style="margin-bottom: 1.5rem;">Admin Access</h2>
        
        <div class="error-message" id="errorMessage">Invalid OTP</div>
        
        <div id="step1">
            <p style="color: var(--color-text-secondary); margin-bottom: 1.5rem;">Click below to send a secure, one-time passcode to the admin email.</p>
            <button id="requestOtpBtn" class="btn btn-outline" style="width: 100%;">Send Login OTP</button>
        </div>

        <form id="loginForm" style="display: none;">
            <p style="color: var(--color-teal); margin-bottom: 1rem; font-weight: 500;">OTP sent! Check John's email.</p>
            <div class="form-group">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--color-text-secondary);">6-Digit OTP</label>
                <input type="text" name="otp" id="otpInput" class="form-control" required placeholder="123456" maxlength="6">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="loginBtn">Log In</button>
        </form>
    </div>

    <script>
        const requestBtn = document.getElementById('requestOtpBtn');
        const loginForm = document.getElementById('loginForm');
        const step1 = document.getElementById('step1');
        const errorMsg = document.getElementById('errorMessage');

        requestBtn.addEventListener('click', async () => {
            requestBtn.disabled = true;
            requestBtn.textContent = 'Sending...';
            errorMsg.style.display = 'none';

            try {
                const res = await fetch('/api/auth/otp', { method: 'POST' });
                if (res.ok) {
                    step1.style.display = 'none';
                    loginForm.style.display = 'block';
                    document.getElementById('otpInput').focus();
                } else {
                    const data = await res.json();
                    errorMsg.textContent = data.error || 'Failed to send OTP (Rate limited).';
                    errorMsg.style.display = 'block';
                    requestBtn.disabled = false;
                    requestBtn.textContent = 'Send Login OTP';
                }
            } catch (err) {
                errorMsg.textContent = 'Network error.';
                errorMsg.style.display = 'block';
                requestBtn.disabled = false;
                requestBtn.textContent = 'Send Login OTP';
            }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Verifying...';
            errorMsg.style.display = 'none';
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    window.location.href = '/admin.html';
                } else {
                    errorMsg.textContent = 'Invalid or expired OTP.';
                    errorMsg.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Log In';
                }
            } catch (err) {
                console.error(err);
                errorMsg.textContent = 'A network error occurred.';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Log In';
            }
        });
    </script>
</body>
</html>
