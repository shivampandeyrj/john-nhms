<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | NHMS</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--color-background);
        }
        .login-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--color-border);
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-radius: 8px;
        }
        .login-card img {
            height: 40px;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .error-message {
            color: #ff4d4d;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="assets/logo.png" alt="NHMS Logo">
        <h2 style="margin-bottom: 1.5rem;">Admin Access</h2>
        
        <div class="error-message" id="errorMessage">Invalid username or password</div>
        
        <form id="loginForm">
            <div class="form-group">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--color-text-secondary);">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--color-text-secondary);">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="loginBtn">Log In</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMessage');
            
            btn.disabled = true;
            btn.textContent = 'Logging in...';
            errorMsg.style.display = 'none';
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    window.location.href = '/admin.html';
                } else {
                    errorMsg.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Log In';
                }
            } catch (err) {
                console.error(err);
                errorMsg.textContent = 'A network error occurred.';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Log In';
            }
        });
    </script>
</body>
</html>
