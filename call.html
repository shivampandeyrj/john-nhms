<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Strategy Call | NHMS</title>
    <link rel="stylesheet" href="css/styles.css">
    <meta name="description" content="Book your 1-on-1 strategy session to map out your scale plan.">
    <style>
        .booking-iframe {
            border: 0;
            width: 100%;
            display: block;
            height: 650px; /* Adjusted for mobile */
        }
        @media (min-width: 768px) {
            .booking-iframe {
                height: 800px; /* Taller for desktop */
            }
        }
    </style>
</head>
<body>
    <nav style="padding: 0; text-align: center; border-bottom: 1px solid var(--color-border); margin-bottom: 1rem;">
        <div class="container" style="display: flex; justify-content: center;">
            <a href="/" style="display: inline-block;">
                <img src="assets/logo.png" alt="NHMS Logo" style="height: 65px; width: auto; max-width: 100%; display: block;">
            </a>
        </div>
    </nav>

    <section style="padding-top: 3rem; padding-bottom: 3rem;">
        <div class="container" style="max-width: 800px; text-align: center;">
            <h1 style="font-size: clamp(2rem, 4vw, 3rem);">Map Out Your <span class="text-teal">Scale Plan</span></h1>
            <p style="margin-bottom: 0; font-size: 1.15rem; line-height: 1.6;">In this 1:1 session, we'll review your experience from the challenge, find what is blocking you, and create a simple plan to help you move forward toward the life and income you truly desire.</p>
        </div>
    </section>

    <section style="padding-top: 0;">
        <div class="container" style="max-width: 900px; margin: 0 auto;">
            <div class="lead-form" style="padding: 0; background: rgba(0, 0, 0, 0.03); overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-radius: 12px;">
                <!-- LeadConnector Booking Widget begin -->
                <iframe src="https://api.leadconnectorhq.com/widget/bookings/strategy-call-john-atkins" class="booking-iframe" frameborder="0"></iframe>
                <!-- end LeadConnector Booking Widget -->
            </div>
        </div>
    </section>
</body>
</html>
